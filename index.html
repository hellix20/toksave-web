<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern TikTok Downloader</title>
    <style>
        /* Pengaturan Dasar */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #2a0845 0%, #0a0a0a 100%);
            color: #ffffff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* Area Judul Atas */
        .header-text {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 30px;
            max-width: 500px;
        }
        .header-text h1 {
            font-size: 22px;
            margin: 0 0 10px 0;
            font-weight: 700;
        }
        .header-text p {
            font-size: 13px;
            color: #a0a0a0;
            margin: 0;
            line-height: 1.5;
        }

        /* Kartu Downloader (Card) */
        .card {
            background-color: #12151f; /* Warna biru gelap / abu-abu gelap */
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
            border: 1px solid #232738;
        }

        .card h2 {
            font-size: 18px;
            margin: 0 0 8px 0;
        }

        .card p.desc {
            font-size: 13px;
            color: #a0a0a0;
            margin: 0 0 20px 0;
            line-height: 1.5;
        }

        .card label {
            display: block;
            font-size: 12px;
            color: #a0a0a0;
            margin-bottom: 8px;
        }

        /* Kolom Input */
        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 20px;
            background-color: #0d0f16;
            border: 1px solid #232738;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus {
            border-color: #b048ff;
        }

        /* Tombol Gradasi Modern */
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #9b2df2, #f51b75);
            color: white;
            border: none;
            border-radius: 50px; /* Bikin tombol lonjong */
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            background: #444;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Area Hasil */
        #result {
            margin-top: 25px;
            display: none;
            background-color: #1a1e2b;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
        }
        #thumb {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        #title {
            font-size: 13px;
            color: #d1d1d1;
            margin-bottom: 15px;
            word-wrap: break-word;
        }
        .btn-download {
            display: block;
            background: #ffffff;
            color: #000000;
            padding: 14px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn-download:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>

    <!-- Area Teks Header -->
    <div class="header-text">
        <h1>TOKSAVE Download MP4</h1>
        <p>TokSave Downloader NO Watermark 100% 😄</p>
    </div>

    <!-- Area Kartu Aplikasi -->
    <div class="card">
        <h2>TOSAVE</h2>
        <p class="desc">Tempel link TikTok, klik download, beres. <strong>GRATIS TANPA WATERMARK.</strong></p>
        
        <label>Link video TikTok</label>
        <input type="text" id="linkInput" placeholder="https://www.tiktok.com/@user/video/123...">
        
        <button id="searchBtn" onclick="downloadVideo()">Ambil Video TikTok</button>

        <!-- Area Hasil -->
        <div id="result">
            <img id="thumb" src="" alt="Thumbnail Video">
            <p id="title">Judul Video</p>
            <a id="downloadBtn" href="" target="_blank" class="btn-download">Download Video Tanpa Watermark</a>
        </div>
    </div>

    <script>
        async function downloadVideo() {
            const link = document.getElementById('linkInput').value;
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('searchBtn');

            if (!link) {
                alert('Silakan masukkan link video terlebih dahulu!');
                return;
            }

            btn.innerText = 'Memproses... ⏳';
            btn.disabled = true;
            resultDiv.style.display = 'none';

            try {
                const response = await fetch('https://www.tikwm.com/api/?url=' + link);
                const data = await response.json();

                if (data.code === 0) {
                    document.getElementById('thumb').src = data.data.cover;
                    document.getElementById('title').innerText = data.data.title;
                    document.getElementById('downloadBtn').href = data.data.play; 
                    
                    resultDiv.style.display = 'block';
                } else {
                    alert('Gagal mengambil video. Pastikan link sudah benar.');
                }
            } catch (error) {
                alert('Terjadi kesalahan pada server. Silakan coba lagi.');
            } finally {
                btn.innerText = 'Ambil Video TikTok';
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>

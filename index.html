<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokSave - TikTok Downloader</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        h2 { margin-top: 0; color: #fff; }
        p { color: #aaa; margin-bottom: 20px; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: white;
            outline: none;
            box-sizing: border-box;
        }
        button {
            background-color: #ff0050;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            transition: 0.3s;
        }
        button:hover { background-color: #cc0040; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        
        /* Area Hasil Video */
        #result {
            margin-top: 25px;
            display: none; /* Disembunyikan sebelum ada hasil */
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
        }
        #thumb {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        #title {
            font-size: 14px;
            margin-bottom: 15px;
            color: #ddd;
            word-wrap: break-word;
        }
        .btn-download {
            display: block;
            background-color: #00f2fe;
            color: #000;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-download:hover { background-color: #00c6d2; }
    </style>
</head>
<body>

    <div class="container">
        <h2>TokSave</h2>
        <p>Download video TikTok tanpa watermark</p>
        
        <input type="text" id="linkInput" placeholder="Tempel link video TikTok di sini...">
        
        <button id="searchBtn" onclick="downloadVideo()">Gas Cari Video</button>

        <div id="result">
            <img id="thumb" src="" alt="Thumbnail Video">
            <p id="title">Judul Video</p>
            <a id="downloadBtn" href="" target="_blank" class="btn-download">⬇️ Download Tanpa Watermark</a>
        </div>
    </div>

    <script>
        async function downloadVideo() {
            const link = document.getElementById('linkInput').value;
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('searchBtn');

            // Cek kalau kolom kosong
            if (!link) {
                alert('Masukin link TikTok-nya dulu dong!');
                return;
            }

            // Ubah tampilan tombol saat proses nyari data
            btn.innerText = 'Lagi nyari video... ⏳';
            btn.disabled = true;
            resultDiv.style.display = 'none';

            try {
                // Memanggil API TikWM
                const response = await fetch('https://www.tikwm.com/api/?url=' + link);
                const data = await response.json();
if (data.code === 0) {
                    // Kalau video ketemu, ganti gambar, judul, dan link download-nya
                    document.getElementById('thumb').src = data.data.cover;
                    document.getElementById('title').innerText = data.data.title;
                    document.getElementById('downloadBtn').href = data.data.play; // Link tanpa watermark
                    
                    // Munculin area hasil
                    resultDiv.style.display = 'block';
                } else {
                    alert('Gagal nemuin video. Coba cek lagi link-nya bener atau nggak.');
                }
            } catch (error) {
                alert('Waduh, ada error nih pas nyambung ke server. Coba lagi nanti ya.');
            } finally {
                // Balikin tombol ke kondisi semula
                btn.innerText = 'Gas Cari Video';
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>

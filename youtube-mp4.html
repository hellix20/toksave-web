    <footer style="text-align: center; padding: 30px 10px; margin-top: 40px; font-size: 14px; color: #6b7280; border-top: 1px solid #e5e7eb;">

    <script>
        const kamus = {
            id: {
                navBack: "⬅ Kembali ke Beranda TikTok",
                btnInstall: "Instal aplikasi",
                heroTitle: "Download Video YouTube MP4",
                inputPlaceholder: "Tempel tautan YouTube di sini",
                btnPaste: "📋 Tempel",
                btnDownload: "Download Video MP4", 
                resTitle: "Video siap diunduh!",
                resDownload: "Lanjutkan ke Halaman Unduh MP4",
                alertEmpty: "Silakan tempelkan tautan video YouTube!"
            },
            en: {
                navBack: "⬅ Back to TikTok Home",
                btnInstall: "Install App",
                heroTitle: "Download YouTube MP4 Videos",
                inputPlaceholder: "Paste YouTube link here",
                btnPaste: "📋 Paste",
                btnDownload: "Download MP4 Video", 
                resTitle: "Video is ready!",
                resDownload: "Continue to MP4 Download Page",
                alertEmpty: "Please paste the YouTube video link!"
            },
            ar: {
                navBack: "⬅ العودة إلى الصفحة الرئيسية لتيك توك",
                btnInstall: "تثبيت التطبيق",
                heroTitle: "تنزيل فيديو يوتيوب MP4",
                inputPlaceholder: "الصق رابط يوتيوب هنا",
                btnPaste: "📋 لصق",
                btnDownload: "تنزيل فيديو MP4", 
                resTitle: "الفيديو جاهز!",
                resDownload: "متابعة إلى صفحة تنزيل MP4",
                alertEmpty: "الرجاء لصق رابط فيديو يوتيوب!"
            }
        };

        let currentLang = 'id';

        function gantiBahasa(lang) {
            currentLang = lang;
            document.body.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(kamus[lang][key]) el.innerHTML = kamus[lang][key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if(kamus[lang][key]) el.placeholder = kamus[lang][key];
            });
        }

        async function pasteClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('linkInput').value = text;
            } catch (err) {
                alert('Gagal tempel / Failed to paste.');
            }
        }

        function extractVideoID(url) {
            let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            let match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function klikTombolUtama() {
            const link = document.getElementById('linkInput').value;
            if (!link) {
                alert(kamus[currentLang].alertEmpty);
                return;
            }
            
            // Popunder iklan lu (Aman dan tetap narik duit)
            window.open('https://www.effectivecpmnetwork.com/ww60vgea?key=3ce187645bfa68bd5b10a5b293e2180b', '_blank');

            const btn = document.getElementById('searchBtn');
            const resultDiv = document.getElementById('result-container'); 
            const videoThumb = document.getElementById('resultThumb'); 
            const videoTitle = document.getElementById('resultTitle'); 
            const downloadBtnLink = document.getElementById('resultDownloadBtn'); 

            btn.innerText = currentLang === 'id' ? 'Memproses... ⏳' : 'Processing... ⏳';
            btn.disabled = true;
            resultDiv.style.display = 'none';

            // Proses instan tanpa server
            setTimeout(() => {
                let videoId = extractVideoID(link);
                
                if(videoId) {
                    // Narik gambar thumbnail langsung dari server asli YouTube
                    videoThumb.innerHTML = `<img src="https://img.youtube.com/vi/${videoId}/hqdefault.jpg" alt="Thumbnail Video" style="width: 100%; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd;">`;
                    
                    videoTitle.innerText = kamus[currentLang].resTitle;
                    
                    // Modifikasi link menuju server download pihak ketiga yang badak
                    downloadBtnLink.href = `https://ssyoutube.com/watch?v=${videoId}`;
                    downloadBtnLink.innerText = kamus[currentLang].resDownload;
                    
                    resultDiv.style.display = 'block';
                    resultDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    alert(currentLang === 'id' ? 'Tautan YouTube tidak valid!' : 'Invalid YouTube link!');
                }
                
                btn.innerText = kamus[currentLang].btnDownload;
                btn.disabled = false;
            }, 800);
        }
    </script>

    <script src="https://pl29904731.effectivecpmnetwork.com/2a/cc/78/2acc783c1468717d402f4f2b18ca2787.js"></script>

        iframe { width: 100%; height: 250px; border: none; border-radius: 8px; }

        @media (max-width: 768px) {

            .input-group input, .btn-paste, .btn-download-main { width: 100%; margin-bottom: 10px; padding: 15px; border-radius: 8px; box-sizing: border-box; }
            .input-group input { background: white; margin-right: 0; margin-left: 0; }

        <p>&copy; 2026 TOKSAVE.</p>

    <script>
        // Kamus Bahasa Sederhana
        const kamus = {
            id: {
                navBack: "⬅ Kembali ke Beranda TikTok",
                heroTitle: "Download Video YouTube MP4",
                inputPlaceholder: "Tempel tautan YouTube di sini",
                btnPaste: "📋 Tempel",
                btnDownload: "Download",
                resTitle: "Pilih Resolusi Video:",
                alertEmpty: "Silakan tempelkan tautan video YouTube!"
            },
            en: {
                navBack: "⬅ Back to TikTok Home",
                heroTitle: "Download YouTube MP4 Videos",
                inputPlaceholder: "Paste YouTube link here",
                btnPaste: "📋 Paste",
                btnDownload: "Download",
                resTitle: "Choose Video Resolution:",
                alertEmpty: "Please paste the YouTube video link!"
            },
            ar: {
                navBack: "⬅ العودة إلى الصفحة الرئيسية لتيك توك",
                heroTitle: "تنزيل فيديو يوتيوب MP4",
                inputPlaceholder: "الصق رابط يوتيوب هنا",
                btnPaste: "📋 لصق",
                btnDownload: "تنزيل",
                resTitle: "اختر دقة الفيديو:",
                alertEmpty: "الرجاء لصق رابط فيديو يوتيوب!"
            }
        };

        let currentLang = 'id';

        function gantiBahasa(lang) {
            currentLang = lang;
            document.body.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(kamus[lang][key]) el.innerHTML = kamus[lang][key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if(kamus[lang][key]) el.placeholder = kamus[lang][key];
            });
            document.title = "TOKSAVE - " + kamus[lang].heroTitle;
        }

        async function pasteClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('linkInput').value = text;
            } catch (err) {
                alert('Gagal tempel / Failed to paste.');
            }
        }

        function klikTombolUtama() {
            let link = document.getElementById('linkInput').value;
            if (!link) {
                alert(kamus[currentLang].alertEmpty);
                return;
            }
            
            // Popunder Iklan Lu (Aman dan Tetap Jalan)
            window.open('https://www.effectivecpmnetwork.com/ww60vgea?key=3ce187645bfa68bd5b10a5b293e2180b', '_blank');

            // Ekstrak ID YouTube
            let videoId = extractVideoID(link);
            
            if(videoId) {
                // Memakai widget gratisan untuk memproses download
                const iframeUrl = `https://api.vevioz.com/api/button/mp4/${videoId}`;
                document.getElementById('downloadWidget').src = iframeUrl;
                
                const resultDiv = document.getElementById('iframe-container');
                resultDiv.style.display = 'block';
                resultDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                alert(currentLang === 'id' ? 'Link YouTube tidak valid!' : 'Invalid YouTube Link!');
            }
        }

        function extractVideoID(url) {
            let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            let match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
    </script>

    <style>
        /* PENGATURAN DASAR */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f6;
            color: #333;
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        body[dir="rtl"] { text-align: right; }
        body[dir="rtl"] .logo, body[dir="rtl"] .nav-right-group { flex-direction: row-reverse; }
        body[dir="rtl"] .input-group { flex-direction: row-reverse; }

        .navbar {
            background-color: #ffffff;
            display: flex;

            padding: 15px 5%;

        }
        .logo { font-size: 24px; font-weight: 800; color: #111; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo span { background-color: #000000; color: white; padding: 4px 8px; border-radius: 4px; font-size: 20px;}
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: #444; font-weight: 500; }
        .nav-right-group { display: flex; align-items: center; gap: 10px; }
        .lang-picker { padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-weight: bold; cursor: pointer; }

        .hero {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%); /* Warna Hitam khas X */
            padding: 60px 20px;
            text-align: center;
            color: white;
        }
        .hero h1 { font-size: 36px; margin-bottom: 30px; }
        .input-group {
            background: white; max-width: 700px; margin: 0 auto; display: flex; padding: 8px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .input-group input { flex: 1; border: none; padding: 15px; font-size: 16px; outline: none; background: transparent; color: #333; }
        .btn-paste { background-color: white; color: #000; border: 1px solid #ddd; padding: 0 15px; margin: 0 8px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-download-main { background-color: #000000; color: white; border: none; padding: 0 30px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }

        #result {
            display: none; max-width: 500px; margin: -30px auto 40px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); text-align: center; position: relative; z-index: 10;
        }
        #thumb { width: 100%; border-radius: 8px; margin-bottom: 15px; }
        #title { color: #333; font-size: 14px; margin-bottom: 15px; }
        .btn-result { display: block; background-color: #000000; color: white; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-bottom: 10px; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .input-group { flex-direction: column; background: transparent; box-shadow: none; }
            .input-group input, .btn-paste, .btn-download-main { width: 100%; margin-bottom: 10px; padding: 15px; border-radius: 8px; box-sizing: border-box; }
            .input-group input { background: white; margin-right: 0; margin-left: 0; }
        }
    </style>
</head>
<body dir="ltr">

    <div class="navbar">
        <a href="index.html" class="logo"><span>𝕏</span> TOKSAVE</a>
        <div class="nav-links">
            <a href="index.html" data-i18n="navBack">⬅ Kembali ke Beranda TikTok</a>
        </div>
        <div class="nav-right-group">
            <select class="lang-picker" onchange="gantiBahasa(this.value)">
                <option value="id">🇮🇩 ID</option>
                <option value="en">🇺🇸 EN</option>
                <option value="ar">🇸🇦 AR</option>
            </select>
        </div>
    </div>

    <div class="hero">
        <h1 data-i18n="heroTitle">Download Video 𝕏 (Twitter)</h1>
        <div class="input-group">
            <input type="text" id="linkInput" data-i18n-placeholder="inputPlaceholder" placeholder="Tempel tautan X (Twitter) di sini">
            <button class="btn-paste" onclick="pasteClipboard()" data-i18n="btnPaste">📋 Tempel</button>
            <button class="btn-download-main" id="searchBtn" onclick="klikTombolUtama()" data-i18n="btnDownload">Download</button>
        </div>
    </div>

    <div id="result">
        <img id="thumb" src="https://via.placeholder.com/400x200?text=Video+Ready" alt="Thumbnail">
        <p id="title">Twitter Video Title</p>
        <a id="downloadBtn" href="#" class="btn-result" data-i18n="resDownload">Unduh Video MP4</a>
    </div>

    <!-- ===== TEMPAT IKLAN BANNER (160x300) ===== -->
    <div style="text-align: center; margin: 30px auto; display: flex; justify-content: center;">
        <script>
            atOptions = {

    <!-- ========================================= -->

    <!-- Footer -->
    <footer style="text-align: center; padding: 30px 10px; margin-top: 40px; font-size: 14px; color: #6b7280; border-top: 1px solid #e5e7eb;">
        <p>&copy; 2026 TOKSAVE.</p>
    </footer>

    <script>
        const kamus = {
            id: {
                navBack: "⬅ Kembali ke Beranda TikTok",
                heroTitle: "Download Video 𝕏 (Twitter)",
                inputPlaceholder: "Tempel tautan X (Twitter) di sini",
                btnPaste: "📋 Tempel",
                btnDownload: "Download",
                resDownload: "Unduh Video MP4",
                alertEmpty: "Silakan tempelkan tautan video Twitter/X!"
            },
            en: {
                navBack: "⬅ Back to TikTok Home",
                heroTitle: "Download 𝕏 (Twitter) Videos",
                inputPlaceholder: "Paste X (Twitter) link here",
                btnPaste: "📋 Paste",
                btnDownload: "Download",
                resDownload: "Download MP4 Video",
                alertEmpty: "Please paste the Twitter/X video link!"
            },
            ar: {
                navBack: "⬅ العودة إلى الصفحة الرئيسية",
                heroTitle: "تنزيل فيديو 𝕏 (تويتر)",
                inputPlaceholder: "الصق رابط تويتر هنا",
                btnPaste: "📋 لصق",
                btnDownload: "تنزيل",
                resDownload: "تنزيل فيديو MP4",
                alertEmpty: "الرجاء لصق رابط فيديو تويتر!"
            }
        };

        let currentLang = 'id';

        function gantiBahasa(lang) {
            currentLang = lang;
            document.body.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(kamus[lang][key]) el.innerHTML = kamus[lang][key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if(kamus[lang][key]) el.placeholder = kamus[lang][key];
            });
            document.title = "TOKSAVE - " + kamus[lang].heroTitle;
        }

        async function pasteClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('linkInput').value = text;
            } catch (err) {
                alert('Gagal tempel / Failed to paste.');
            }
        }

        function klikTombolUtama() {
            let link = document.getElementById('linkInput').value;
            if (!link) {
                alert(kamus[currentLang].alertEmpty);
                return;
            }
            
            // Trigger Popunder Iklan
            window.open('https://www.effectivecpmnetwork.com/ww60vgea?key=3ce187645bfa68bd5b10a5b293e2180b', '_blank');

            const btn = document.getElementById('searchBtn');
            btn.innerText = currentLang === 'id' ? 'Memproses... ⏳' : 'Processing... ⏳';
            btn.disabled = true;
            document.getElementById('result').style.display = 'none';

            // Simulasi API X/Twitter
            setTimeout(() => {
                if(link.includes('x.com') || link.includes('twitter.com')) {
                    // Karena API Twitter publik sering ganti/bayar, 
                    // web akan mengarahkan pengguna memakai trik modifikasi URL.
                    let cleanLink = link.split('?')[0];
                    let downloadUrl = cleanLink.replace('twitter.com', 'ssstwitter.com').replace('x.com', 'ssstwitter.com');
                    
                    document.getElementById('title').innerText = currentLang === 'id' ? 'Video ditemukan! Lanjut ke halaman unduh.' : 'Video found! Continue to download page.';
                    document.getElementById('downloadBtn').href = downloadUrl;
                    
                    const resultDiv = document.getElementById('result');
                    resultDiv.style.display = 'block';
                    resultDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    alert(currentLang === 'id' ? 'Tautan tidak valid! Pastikan itu adalah tautan dari x.com atau twitter.com' : 'Invalid link! Make sure it is from x.com or twitter.com');
                }
                btn.innerText = kamus[currentLang].btnDownload;
                btn.disabled = false;
            }, 1500);
        }
    </script>

    <script src="https://pl29904731.effectivecpmnetwork.com/2a/cc/78/2acc783c1468717d402f4f2b18ca2787.js"></script>

</body>
